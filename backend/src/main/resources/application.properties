spring.application.name=finance-tracker

# MongoDB Atlas — replace with your connection string via environment variable
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/financetracker}
spring.data.mongodb.database=financetracker

# JWT — base64-encoded secret, min 256 bits
app.jwt.secret=${JWT_SECRET:changethissecretkeyinproductiontoomethinglongenough}
app.jwt.expiration=86400000

server.port=8080

# Logging
logging.level.com.financetracker=DEBUG
